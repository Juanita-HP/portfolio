<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Resume | Juanita</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        @keyframes shake {
            0%   { transform: translateX(0); }
            25%  { transform: translateX(-12px); }
            50%  { transform: translateX(12px); }
            75%  { transform: translateX(-12px); }
            100% { transform: translateX(0); }
        }
        .wiggle { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body>
    <nav>
        <ul class="nav-links">
            <li class="nav-item" style="--i:1"><a href="index.html" class="blue">Home</a></li>
            <li class="nav-item" style="--i:2"><a href="projects.html" class="orange">Projects</a></li>
            <li class="nav-item" style="--i:3"><a href="experience.html" class="green">Experience</a></li>
            <li class="nav-item" style="--i:4"><a href="certificates.html" class="purple">Certificates</a></li>
            <li class="nav-item active" style="--i:5"><a href="resume.html" class="pink">Resume</a></li>
            <li class="nav-item" style="--i:6"><a href="https://github.com/Juanita-HP" target="_blank" class="red">GitHub</a></li>
            <li class="nav-item" style="--i:7"><a href="https://www.linkedin.com/in/juanita-hp/" target="_blank" class="yellow">LinkedIn</a></li>
        </ul>
    </nav>

    <main class="home-main">
        <div class="form-container fade-in" id="mainContainer">
            <h1 style="color: #fff; margin-bottom: 10px;">Access Credentials</h1>
            <p style="color: #8b949e; margin-bottom: 30px;">Please complete the form below to request access to my resume.</p>

            <form id="resumeForm" action="https://formspree.io/f/mrelkekq" method="POST">
                <input type="hidden" name="_next" value="thanks.html">
                <div class="form-group">
                    <label>Your Name (Mandatory)</label>
                    <input type="text" name="name" id="userName" required placeholder="Full Name">
                </div>
                <div class="form-group">
                    <label>Email Address (Mandatory)</label>
                    <input type="email" name="email" required placeholder="email@company.com">
                </div>
                <div class="form-group">
                    <label>Phone Number (Optional)</label>
                    <input type="tel" name="phone" placeholder="+1 (xxx) xxx-xxxx">
                </div>
                <div class="form-group">
                    <label>LinkedIn Profile URL (Mandatory)</label>
                    <input type="url" name="linkedin" required placeholder="https://www.linkedin.com/in/yourprofile">
                </div>
                <div class="form-group">
                    <label>Company (Mandatory)</label>
                    <input type="text" name="company" id="companyName" required placeholder="Organization Name">
                </div>
                <div class="form-group">
                    <label>Purpose of Request (Mandatory)</label>
                    <textarea name="purpose" id="purposeText" rows="4" required placeholder="Describe the opportunity..."></textarea>
                </div>
                <input type="text" name="_gotcha" style="display:none">
                <button type="submit" class="submit-btn">SEND REQUEST</button>
            </form>

            <p id="moderatorWarning" style="color: #ff7b72; margin-top: 20px; display: none; font-weight: bold; text-align: center; border: 1px solid #ff7b72; padding: 10px; border-radius: 6px; background: rgba(255, 123, 114, 0.1);">
                ACCESS DENIED: Unprofessional language detected. Please revise your submission.
            </p>
        </div>
    </main>

    <script>
        const form = document.getElementById('resumeForm');
        const warning = document.getElementById('moderatorWarning');
        const container = document.getElementById('mainContainer');

        const royalGuard = [
            /\b[n|r][i|1|!|l|y][g|9|q]{2,}[a|e|3|r|4|x|@|o]+\b/i,
            /\b(f[uv*]ck|sh[i1!]t|b[i1]tch|p[uv]ssy|d[i1]ck|assh[o0]le|c[uv]nt)\b/i,
            /\b(p[uv]t[ao]|m[i1]erd[ae]|p[e3]nd[e3]j|ch[i1]ngar|c[uv]l[o0])\b/i,
            /\b([a-z])\1{4,}\b/i,
            /\b[b-df-hj-np-tv-z]{6,}\b/i,
            /[0-9]{8,}/,
            /\b(troll|stupid|idiot|dumb|hate|kill|die|ugly|fat|stink)\b/i
        ];

        form.addEventListener('submit', (e) => {
            const combinedText = (
                document.getElementById('userName').value + " " +
                document.getElementById('companyName').value + " " +
                document.getElementById('purposeText').value
            ).toLowerCase();

            if (royalGuard.some(regex => regex.test(combinedText))) {
                e.preventDefault();
                warning.style.display = 'block';
                container.classList.add('wiggle');
                setTimeout(() => container.classList.remove('wiggle'), 400);
                return false;
            }
        });
    </script>
</body>
</html>
